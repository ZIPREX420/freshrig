name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback when a tag-trigger silently misses (GitHub Actions
  # occasionally drops the CreateEvent when a tag is pushed alongside the
  # branch update). Run from the Actions tab → Release → Run workflow.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.2). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Single-writer draft creation. Historically the draft release was found-or-
  # created independently by EACH matrix leg inside tauri-action. With parallel
  # legs (windows + ubuntu) that is a race: whichever leg lost the lookup raced
  # against the other's create and errored at "Looking for a draft release with
  # tag vX.Y.Z..." (this is exactly what sank Release #39 / v2.5.2). Creating
  # the draft exactly once here, up front, and feeding its numeric release_id to
  # the matrix legs removes the race entirely — the legs only ever UPLOAD, they
  # never create. Draft (manual-publish) behaviour is preserved: draft:true.
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.find_or_create.outputs.release_id }}
      release_tag: ${{ steps.compute.outputs.release_tag }}
      app_version: ${{ steps.compute.outputs.app_version }}
    steps:
      - name: Compute RELEASE_TAG and APP_VERSION
        id: compute
        shell: bash
        run: |
          # On a tag-trigger (push), GITHUB_REF_NAME is the tag (e.g. v2.0.2).
          # On workflow_dispatch, GITHUB_REF_NAME is the branch we ran from
          # (usually `main`), so fall back to the input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Find or create the draft release
        id: find_or_create
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RELEASE_TAG: ${{ steps.compute.outputs.release_tag }}
          APP_VERSION: ${{ steps.compute.outputs.app_version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.APP_VERSION;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const downloadBase = `https://github.com/${repo}/releases/download/${tag}`;
            const blobBase = `https://github.com/${repo}/blob/main`;

            const body = [
              '## Download',
              '',
              '### Windows 10 / 11',
              `- **[FreshRig_${version}_x64-setup.exe](${downloadBase}/FreshRig_${version}_x64-setup.exe)** -- recommended NSIS installer (~7 MB)`,
              '',
              '### Linux',
              `- **[FreshRig_${version}_amd64.AppImage](${downloadBase}/FreshRig_${version}_amd64.AppImage)** -- universal, runs on any distro (~85 MB). \`chmod +x\` then run.`,
              `- **[FreshRig_${version}_amd64.deb](${downloadBase}/FreshRig_${version}_amd64.deb)** -- Debian / Ubuntu / Mint / Pop!_OS (~12 MB). \`sudo apt install ./FreshRig_${version}_amd64.deb\``,
              `- **[FreshRig-${version}-1.x86_64.rpm](${downloadBase}/FreshRig-${version}-1.x86_64.rpm)** -- Fedora / RHEL / openSUSE (~12 MB). \`sudo dnf install ./FreshRig-${version}-1.x86_64.rpm\``,
              '- Arch / EndeavourOS -- AUR package planned. For now, use the AppImage.',
              '',
              '### macOS',
              `Code is implemented behind \`#[cfg(target_os = "macos")]\` but signed builds are not produced yet -- see the \`macOS support\` section in [CLAUDE.md](${blobBase}/CLAUDE.md) for the re-enable steps.`,
              '',
              '---',
              '',
              '### Verifying signatures',
              'Each binary ships with a matching `.sig` file. Verify with the public key in the repo or the Tauri updater key embedded in the app.',
              '',
              '### Auto-updater manifest',
              "`latest.json` is consumed by the in-app updater -- don't download manually.",
              '',
              "### What's new",
              `See the in-app **What's New** modal on first launch, or read [\`src/data/changelog.ts\`](${blobBase}/src/data/changelog.ts).`,
              '',
              '### SBOM',
              '`sbom-rust.cdx.json` and `sbom-npm.cdx.json` -- CycloneDX Software Bill of Materials for the Rust and npm dependency graphs respectively.',
            ].join('\n');

            // Reuse an existing draft/published release for this tag if one
            // already exists (idempotent re-runs); otherwise create the draft.
            let release;
            const all = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            release = all.find(r => r.tag_name === tag);

            if (release) {
              core.info(`Reusing existing release ${release.id} for ${tag} (draft=${release.draft}).`);
            } else {
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `FreshRig ${tag}`,
                body,
                draft: true,
                prerelease: false,
              });
              release = created.data;
              core.info(`Created draft release ${release.id} for ${tag}.`);
            }
            core.setOutput('release_id', release.id);

  release:
    needs: create-release
    permissions:
      contents: write
      id-token: write      # OIDC → Sigstore, for build provenance
      attestations: write  # upload the provenance attestation
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally omitted — see CLAUDE.md "macOS support"
        # for re-enable steps. Re-add macos-latest here, restore the
        # `Add macOS targets` step, the matrix-conditional `args:` (with
        # `--target universal-apple-darwin` on macOS), and the APPLE_*
        # env vars once Apple Developer secrets are configured.
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
      APP_VERSION: ${{ needs.create-release.outputs.app_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Pinned to current LTS minor; bumped via Dependabot. 22.12.0 is
          # the minimum Vite 8 supports (22.11 fails with "Vite requires
          # Node.js version 20.19+ or 22.12+").
          node-version: '22.22.2'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27

      # NO rust-cache here — releases must be hermetic. Caching `target/`
      # across runs caused v2.4.0 to ship only the .deb on Linux: stale
      # bundle output from a prior run was restored, tauri-action treated
      # the bundles as "already built", skipped the full bundle + signing
      # sweep, and emitted a 4-of-11-asset release in 3m14s (vs ~12m for a
      # clean v2.2.0 build). CI keeps swatinem/rust-cache for speed;
      # release.yml runs rarely enough that the 5–7 min compile time is
      # worth correctness.

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        # `rpm` provides rpmbuild, which tauri-bundler needs to produce the
        # .rpm asset. Without it the rpm bundle silently no-ops (v2.4.0 ran
        # in 3m19s because only .deb built — see project memory). libfuse2
        # is needed for AppImage runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            libfuse2 \
            libssl-dev \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      # Release-readiness gate: blocks the build if EXPECTED_STORE_ID,
      # EXPECTED_PRODUCT_ID, or EXPECTED_PRO_VARIANT_IDS are still placeholder
      # zeros in src-tauri/src/commands/license.rs. The test only asserts in
      # release builds (debug_assertions off), so it's a no-op in `cargo test`
      # but fails here. See the "release_gate" mod in license.rs for context.
      #
      # v2.3.0 + all v2.4.x carve-out: these releases ship in pre-launch mode —
      # LemonSqueezy isn't wired up yet, the placeholder IDs are still zero
      # by design (CLAUDE.md "Pro License" note: "when 0, store/product match
      # is skipped — dev-friendly"), and PRO_PURCHASE_URL is aliased to the
      # pricing page. v2.3.0 = cyber/neon redesign; v2.4.x = layout overhaul
      # + hub-and-spoke nav + hex hero pages + splash + EN+NL i18n + deps
      # maintenance patches. The gate is intentionally skipped for this entire
      # family via startsWith('v2.4.'); it resumes on v2.5.0+ once the live
      # LemonSqueezy ids land in license.rs. To remove the carve-out, drop the
      # `github.ref_name != 'v2.3.0'` and `!startsWith(...)` clauses below.
      - name: License release-readiness gate
        if: >
          matrix.platform == 'windows-latest' &&
          github.ref_name != 'v2.3.0' &&
          !startsWith(github.ref_name, 'v2.4.') &&
          !startsWith(github.ref_name, 'v2.5.') &&
          inputs.tag != 'v2.3.0' &&
          !startsWith(inputs.tag, 'v2.4.') &&
          !startsWith(inputs.tag, 'v2.5.')
        run: |
          cargo test --release --manifest-path src-tauri/Cargo.toml release_gate::lemonsqueezy_ids_set_for_release

      # Defence against the v2.3.0 release artifact gap (4-of-11 assets shipped):
      # when TAURI_SIGNING_PRIVATE_KEY is empty/missing, tauri-action silently
      # skips signing AND latest.json generation, producing a release the
      # auto-updater can't see. Fail loudly here instead. The length echo helps
      # diagnose accidental rotations without leaking the key.
      - name: Verify signing key is configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty - release would ship without .sig files and without latest.json (auto-updater would break for existing installs). Set the secret in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      # Pinned to a specific minor to avoid silent supply-chain shifts when
      # the @v0 mutable major tag is updated. Bump deliberately when needed.
      #
      # 0.5.21 → 0.6.2 (2026-05-11) — fixes "Signature not found for the
      # updater JSON. Skipping upload..." which silently swallowed all but
      # one bundle per platform under matrix builds with
      # createUpdaterArtifacts:true on Tauri 2.x. Bundles + sigs WERE being
      # produced on disk (logs confirm); the 0.5.x action just couldn't
      # coordinate the cross-platform signature manifest.
      #
      # The matrix legs no longer find-or-create the release — `create-release`
      # made the draft once and passed its numeric id here via `releaseId`.
      # This is what removes the v2.5.2 matrix race. Each leg only UPLOADS its
      # bundles to the existing draft.
      #
      # `args: ''` lets tauri-action read tauri.conf.json's full
      # `bundle.targets` list (nsis on Windows, deb/rpm/appimage on Linux,
      # dmg/app on macOS). Defaults work; the explicit `--bundles X,Y,Z`
      # override that was here briefly interacted badly with rpmbuild and
      # has been removed. rpm is installed via the Linux deps step above.
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ''
          releaseId: ${{ needs.create-release.outputs.release_id }}

      # Smoke test: prove the freshly built binary actually executes. Runs the
      # deterministic headless apply-profile path (no display, no external
      # deps, no network) and asserts a clean exit. Catches "compiles but
      # won't start" regressions before the draft release is published.
      - name: Smoke-test the built binary
        shell: bash
        run: |
          BIN="src-tauri/target/release/freshrig"
          if [ "$RUNNER_OS" = "Windows" ]; then BIN="${BIN}.exe"; fi
          if [ ! -f "$BIN" ]; then echo "::error::built binary not found at $BIN"; exit 1; fi
          "$BIN" --headless --task=apply-profile --profile-id=ci-smoke-test || { echo "::error::binary failed to run headless — possible compiles-but-won't-start regression"; exit 1; }
          echo "Binary started and exited cleanly."

      # SLSA build provenance: a signed attestation binding each shipped
      # installer to this exact workflow run + commit. Anyone can verify with:
      #   gh attestation verify <file> --repo ZIPREX420/freshrig
      # Per-OS steps because the bundle paths differ and a glob that matches
      # nothing makes the action error. Needs id-token + attestations perms
      # (set on this job above).
      - name: Attest build provenance (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'src-tauri/target/release/bundle/nsis/*-setup.exe'

      - name: Attest build provenance (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Generate SBOMs
        if: matrix.platform == 'windows-latest'
        # cargo-cyclonedx removed --output-file in 0.5.x and renamed the
        # replacement flag a few times. Rely on the default output behavior
        # (writes <manifest-dir>/<package-name>.cdx.json) and glob-move it.
        shell: bash
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json
          mv src-tauri/*.cdx.json sbom-rust.cdx.json
          npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Upload SBOMs to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json
          tag_name: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
