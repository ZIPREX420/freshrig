name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback when a tag-trigger silently misses (GitHub Actions
  # occasionally drops the CreateEvent when a tag is pushed alongside the
  # branch update). Run from the Actions tab → Release → Run workflow.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.2). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally omitted — see CLAUDE.md "macOS support"
        # for re-enable steps. Re-add macos-latest here, restore the
        # `Add macOS targets` step, the matrix-conditional `args:` (with
        # `--target universal-apple-darwin` on macOS), and the APPLE_*
        # env vars once Apple Developer secrets are configured.
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Pinned to current LTS minor; bumped via Dependabot. 22.12.0 is
          # the minimum Vite 8 supports (22.11 fails with "Vite requires
          # Node.js version 20.19+ or 22.12+").
          node-version: '22.22.2'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        # `rpm` provides rpmbuild, which tauri-bundler needs to produce the
        # .rpm asset. Without it the rpm bundle silently no-ops (v2.4.0 ran
        # in 3m19s because only .deb built — see project memory). libfuse2
        # is needed for AppImage runtime.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            libfuse2 \
            libssl-dev \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      # Release-readiness gate: blocks the build if EXPECTED_STORE_ID,
      # EXPECTED_PRODUCT_ID, or EXPECTED_PRO_VARIANT_IDS are still placeholder
      # zeros in src-tauri/src/commands/license.rs. The test only asserts in
      # release builds (debug_assertions off), so it's a no-op in `cargo test`
      # but fails here. See the "release_gate" mod in license.rs for context.
      #
      # v2.3.0 + v2.4.0 carve-out: both releases ship in pre-launch mode —
      # LemonSqueezy isn't wired up yet, the placeholder IDs are still zero
      # by design (CLAUDE.md "Pro License" note: "when 0, store/product match
      # is skipped — dev-friendly"), and PRO_PURCHASE_URL is aliased to the
      # pricing page. v2.3.0 carved out the cyber/neon visual redesign;
      # v2.4.0 carves out the layout overhaul (hub-and-spoke nav, hex hero
      # pages, splash screen, EN+NL i18n). The gate is intentionally skipped
      # for these two tags so both ship; it resumes on v2.5.0+ once the live
      # LemonSqueezy ids land in license.rs. To remove the carve-out, drop
      # the four `&& ... != 'v2.X.0'` clauses from the `if:` below.
      - name: License release-readiness gate
        if: matrix.platform == 'windows-latest' && github.ref_name != 'v2.3.0' && github.ref_name != 'v2.4.0' && inputs.tag != 'v2.3.0' && inputs.tag != 'v2.4.0'
        run: |
          cargo test --release --manifest-path src-tauri/Cargo.toml release_gate::lemonsqueezy_ids_set_for_release

      - name: Compute RELEASE_TAG and APP_VERSION
        shell: bash
        run: |
          # On a tag-trigger (push), GITHUB_REF_NAME is the tag (e.g. v2.0.2).
          # On workflow_dispatch, GITHUB_REF_NAME is the branch we ran from
          # (usually `main`), so fall back to the input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "APP_VERSION=${TAG#v}" >> "$GITHUB_ENV"

      # Defence against the v2.3.0 release artifact gap (4-of-11 assets shipped):
      # when TAURI_SIGNING_PRIVATE_KEY is empty/missing, tauri-action silently
      # skips signing AND latest.json generation, producing a release the
      # auto-updater can't see. Fail loudly here instead. The length echo helps
      # diagnose accidental rotations without leaking the key.
      - name: Verify signing key is configured
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty - release would ship without .sig files and without latest.json (auto-updater would break for existing installs). Set the secret in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "TAURI_SIGNING_PRIVATE_KEY is set (length: ${#TAURI_SIGNING_PRIVATE_KEY} chars)"

      # Pinned to a specific minor to avoid silent supply-chain shifts when
      # the @v0 mutable major tag is updated. Bump deliberately when needed.
      #
      # `args: ''` lets tauri-action read tauri.conf.json's full
      # `bundle.targets` list (nsis on Windows, deb/rpm/appimage on Linux,
      # dmg/app on macOS). v2.4.0 attempted an explicit `--bundles X,Y,Z`
      # override here, which interacted badly with the missing rpmbuild dep
      # (only .deb built; .rpm + .AppImage silently no-op'd). Reverting to
      # the v2.2.0-era default + adding rpm to apt-get fixes this.
      - uses: tauri-apps/tauri-action@v0.5.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ''
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'FreshRig ${{ env.RELEASE_TAG }}'
          releaseBody: |
            ## Download

            ### Windows 10 / 11
            - **[FreshRig_${{ env.APP_VERSION }}_x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/FreshRig_${{ env.APP_VERSION }}_x64-setup.exe)** -- recommended NSIS installer (~7 MB)

            ### Linux
            - **[FreshRig_${{ env.APP_VERSION }}_amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/FreshRig_${{ env.APP_VERSION }}_amd64.AppImage)** -- universal, runs on any distro (~85 MB). `chmod +x` then run.
            - **[FreshRig_${{ env.APP_VERSION }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/FreshRig_${{ env.APP_VERSION }}_amd64.deb)** -- Debian / Ubuntu / Mint / Pop!_OS (~12 MB). `sudo apt install ./FreshRig_${{ env.APP_VERSION }}_amd64.deb`
            - **[FreshRig-${{ env.APP_VERSION }}-1.x86_64.rpm](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/FreshRig-${{ env.APP_VERSION }}-1.x86_64.rpm)** -- Fedora / RHEL / openSUSE (~12 MB). `sudo dnf install ./FreshRig-${{ env.APP_VERSION }}-1.x86_64.rpm`
            - Arch / EndeavourOS -- AUR package planned. For now, use the AppImage.

            ### macOS
            Code is implemented behind `#[cfg(target_os = "macos")]` but signed builds are not produced yet -- see the `macOS support` section in [CLAUDE.md](https://github.com/${{ github.repository }}/blob/main/CLAUDE.md) for the re-enable steps.

            ---

            ### Verifying signatures
            Each binary ships with a matching `.sig` file. Verify with the public key in the repo or the Tauri updater key embedded in the app.

            ### Auto-updater manifest
            `latest.json` is consumed by the in-app updater -- don't download manually.

            ### What's new
            See the in-app **What's New** modal on first launch, or read [`src/data/changelog.ts`](https://github.com/${{ github.repository }}/blob/main/src/data/changelog.ts).

            ### SBOM
            `sbom-rust.cdx.json` and `sbom-npm.cdx.json` -- CycloneDX Software Bill of Materials for the Rust and npm dependency graphs respectively.
          releaseDraft: true
          prerelease: false

      - name: Generate SBOMs
        if: matrix.platform == 'windows-latest'
        # cargo-cyclonedx removed --output-file in 0.5.x and renamed the
        # replacement flag a few times. Rely on the default output behavior
        # (writes <manifest-dir>/<package-name>.cdx.json) and glob-move it.
        shell: bash
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json
          mv src-tauri/*.cdx.json sbom-rust.cdx.json
          npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Upload SBOMs to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json
          tag_name: ${{ env.RELEASE_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
