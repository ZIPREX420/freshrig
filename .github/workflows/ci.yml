name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally omitted — see CLAUDE.md "macOS support"
        # for re-enable steps. macOS Rust code stays cfg-gated in src-tauri/.
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Pinned to current LTS minor; bumped via Dependabot. 22.12.0 is
          # the minimum Vite 8 supports (22.11 fails with "Vite requires
          # Node.js version 20.19+ or 22.12+").
          node-version: '22.22.2'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27

      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            libfuse2 \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo audit
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo install --locked cargo-audit
          # cargo-audit v0.22+ honours `audit.toml` only at
          # `$CARGO_HOME/audit.toml` — there is no flag for an arbitrary
          # config path (`--config` is not a valid option). Copy our
          # suppression file (the source-of-truth for the 19 transitive
          # advisories Tauri currently surfaces; see
          # src-tauri/.cargo/audit.toml + CLAUDE.md "Known upstream
          # issues") into the discovery path so the ignore list is
          # honoured without a long inline `--ignore` flag chain.
          mkdir -p "${CARGO_HOME:-$HOME/.cargo}"
          cp src-tauri/.cargo/audit.toml "${CARGO_HOME:-$HOME/.cargo}/audit.toml"
          cargo audit --file src-tauri/Cargo.lock --deny warnings

      - name: Generate Rust SBOM
        if: matrix.platform == 'windows-latest'
        # cargo-cyclonedx removed --output-file in 0.5.x and renamed the
        # replacement flag a few times. Rely on the default output behavior
        # (writes <manifest-dir>/<package-name>.cdx.json) and glob-move it.
        shell: bash
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json
          mv src-tauri/*.cdx.json sbom-rust.cdx.json

      - name: Generate npm SBOM
        if: matrix.platform == 'windows-latest'
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Upload SBOMs
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json
