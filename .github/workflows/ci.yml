name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally omitted — see CLAUDE.md "macOS support"
        # for re-enable steps. macOS Rust code stays cfg-gated in src-tauri/.
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Pinned to current LTS minor; bumped via Dependabot. 22.12.0 is
          # the minimum Vite 8 supports (22.11 fails with "Vite requires
          # Node.js version 20.19+ or 22.12+").
          node-version: '22.22.2'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            libfuse2 \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo audit
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          cargo install --locked cargo-audit
          # See src-tauri/.cargo/audit.toml + CLAUDE.md "Known upstream
          # issues" for rationale on suppressed advisories.
          mkdir -p "${CARGO_HOME:-$HOME/.cargo}"
          cp src-tauri/.cargo/audit.toml "${CARGO_HOME:-$HOME/.cargo}/audit.toml"
          # TEMP DEBUG: surface advisory IDs as annotations so we can
          # extend the suppression list. Remove once green.
          set +e
          cargo audit --file src-tauri/Cargo.lock --deny warnings 2>&1 | tee audit.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "===== AUDIT FAILED with exit $EXIT ====="
            sed 's/\x1b\[[0-9;]*m//g' audit.log \
              | grep -v '^$' \
              | tail -120 \
              | while IFS= read -r line; do
                  clean=$(printf '%s' "$line" | sed 's/%/%25/g; s/\r/%0D/g')
                  echo "::error::$clean"
                done
          fi
          exit $EXIT

      - name: Generate Rust SBOM
        if: matrix.platform == 'windows-latest'
        # cargo-cyclonedx removed --output-file in 0.5.x and renamed the
        # replacement flag a few times. Rely on the default output behavior
        # (writes <manifest-dir>/<package-name>.cdx.json) and glob-move it.
        shell: bash
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json
          mv src-tauri/*.cdx.json sbom-rust.cdx.json

      - name: Generate npm SBOM
        if: matrix.platform == 'windows-latest'
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Upload SBOMs
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json
