name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally omitted — see CLAUDE.md "macOS support"
        # for re-enable steps. macOS Rust code stays cfg-gated in src-tauri/.
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Pinned to current LTS minor; bumped via Dependabot.
          node-version: '22.11.0'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            libfuse2 \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build frontend
        shell: bash
        run: |
          # TEMP DEBUG: capture build output so the failing line surfaces in
          # check-run annotations (the workflow log itself is auth-gated and
          # not readable to anonymous CI investigators). Remove this block
          # once the underlying failure is fixed.
          set +e
          set -o pipefail
          npm run build 2>&1 | tee build-frontend.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo ""
            echo "===== BUILD FAILED with exit $EXIT — full log: ====="
            cat build-frontend.log
            echo "===== END BUILD LOG ====="
            # Emit each non-empty line of the tail as a ::error:: annotation
            # so the GH UI / API exposes the failure reason.
            tail -120 build-frontend.log | while IFS= read -r line; do
              clean=$(printf '%s' "$line" | sed 's/\x1b\[[0-9;]*m//g')
              if [ -n "$clean" ]; then
                # Escape characters that GH actions group commands treat specially.
                clean=$(printf '%s' "$clean" | sed 's/%/%25/g; s/\r/%0D/g')
                echo "::error::$clean"
              fi
            done
          fi
          exit $EXIT

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Rust fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo audit
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          cargo install --locked cargo-audit
          # Suppressions live in src-tauri/.cargo/audit.toml.
          cargo audit --file src-tauri/Cargo.lock --deny warnings

      - name: Generate Rust SBOM
        if: matrix.platform == 'windows-latest'
        # cargo-cyclonedx removed --output-file in 0.5.x and renamed the
        # replacement flag a few times. Rely on the default output behavior
        # (writes <manifest-dir>/<package-name>.cdx.json) and glob-move it.
        shell: bash
        run: |
          cargo install cargo-cyclonedx
          cargo cyclonedx --manifest-path src-tauri/Cargo.toml --format json
          mv src-tauri/*.cdx.json sbom-rust.cdx.json

      - name: Generate npm SBOM
        if: matrix.platform == 'windows-latest'
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom-npm.cdx.json

      - name: Upload SBOMs
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom-rust.cdx.json
            sbom-npm.cdx.json
