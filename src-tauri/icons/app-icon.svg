<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    FreshRig app icon — neon FR monogram, words intentionally omitted
    (clean OS icon).
    1024×1024 master. Tauri's `npx @tauri-apps/cli icon app-icon.svg`
    regenerates the full PNG/ICO/ICNS family from this file.

    Design intent (matches the operator-supplied reference):
      * UPRIGHT (not italic) F + R letterforms — vertical strokes are
        perfectly straight, top arms horizontal.
      * Hollow neon-tube effect: 64-wide gradient outer stroke, 44-wide
        dark cutout, 4-wide bright highlight — leaves ~10-wide bright
        rings on each side and the dark hollow dominates the centre.
      * Layered cyan + magenta gaussian-blur bloom for the rich neon halo.
      * Cyan ⟶ violet ⟶ magenta linear gradient (left to right) so the
        F reads cyan, the R reads magenta, with a kiss between.
      * Transparent background — OS applies its own dock / taskbar surface;
        no baked-in plate so the icon looks native on every desktop.
  -->
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1024" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="42%"  stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#a060ff"/>
      <stop offset="58%"  stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>

    <!--
      Bloom: a wide cyan halo (b3) and a tighter magenta halo (b2), both
      derived from the source-alpha silhouette and merged BEHIND the live
      stroke. b1 is a tight blur applied last for a soft bright bloom on
      top. Flood opacities tuned so the FR reads "lit neon sign" rather
      than "watercolour smear".
    -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"  result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="b2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="34" result="b3"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.70" result="cyan"/>
      <feComposite in="cyan" in2="b3" operator="in" result="cyan-glow"/>
      <feFlood flood-color="#ff2bd6" flood-opacity="0.70" result="mag"/>
      <feComposite in="mag" in2="b2" operator="in" result="mag-glow"/>
      <feMerge>
        <feMergeNode in="cyan-glow"/>
        <feMergeNode in="mag-glow"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!--
      FR letterforms — UPRIGHT (no italic lean). Coordinates target a
      ~520-tall × 700-wide centred area in the 1024² icon, with breathing
      room around the edges so the bloom radiates without clipping.
    -->
    <g id="fr-glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- F: vertical, top arm, mid arm -->
      <path d="M 240 230 L 240 770"/>
      <path d="M 240 230 L 480 230"/>
      <path d="M 240 510 L 410 510"/>
      <!-- R: vertical, bowl, diagonal leg -->
      <path d="M 600 230 L 600 770"/>
      <path d="M 600 230 L 720 230 C 850 230 850 510 720 510 L 600 510"/>
      <path d="M 720 510 L 868 770"/>
    </g>
  </defs>

  <!--
    Hollow neon tube — three concentric strokes on the same path:
      1. 64-wide gradient outer stroke (the tube body)
      2. 44-wide dark cutout (punches the inside out, leaving 10-wide
         bright rings on each side — the visible neon edges)
      3. 4-wide bright highlight (subtle inner specular glint, 0.7 opacity)
    Bloom on the parent group adds the rich halo around the silhouette.
    Transparent canvas — no baseplate so the icon looks native on every OS.
  -->
  <g filter="url(#bloom)">
    <use href="#fr-glyph" stroke="url(#neon)" stroke-width="64"/>
    <use href="#fr-glyph" stroke="#05060a"   stroke-width="44"/>
    <use href="#fr-glyph" stroke="#ffffff"   stroke-width="4" opacity="0.7"/>
  </g>
</svg>
