<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    FreshRig Open Graph card. 1200×630 social-share image; doubles as the
    landing-page favicon (referenced from site/{index,download,privacy,terms}.html).
    Uses the same FR letterforms as src-tauri/icons/app-icon.svg, scaled to fit
    above the wordmark.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="100%" stop-color="#05060a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1024" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="50%"  stop-color="#9b6bff"/>
      <stop offset="100%" stop-color="#ff2bd6"/>
    </linearGradient>
    <radialGradient id="glow-cyan" cx="15%" cy="20%" r="55%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-magenta" cx="85%" cy="80%" r="55%">
      <stop offset="0%"   stop-color="#ff2bd6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.04"/>
    </pattern>

    <!-- Layered bloom — same recipe as the master app-icon.svg, smaller blur radii to suit the OG scale. -->
    <filter id="bloom" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"  result="b1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="9"  result="b2"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="b3"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.55" result="cyan"/>
      <feComposite in="cyan" in2="b3" operator="in" result="cyan-glow"/>
      <feFlood flood-color="#ff2bd6" flood-opacity="0.55" result="mag"/>
      <feComposite in="mag" in2="b2" operator="in" result="mag-glow"/>
      <feMerge>
        <feMergeNode in="cyan-glow"/>
        <feMergeNode in="mag-glow"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Same glyph geometry as src-tauri/icons/app-icon.svg. Scaled by the parent transform. -->
    <g id="fr-glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 260 240 L 245 760"/>
      <path d="M 252 240 L 480 240"/>
      <path d="M 248 510 L 425 510"/>
      <path d="M 590 240 L 575 760"/>
      <path d="M 582 240 L 720 240 C 844 240 844 510 720 510 L 605 510"/>
      <path d="M 660 510 L 870 760"/>
    </g>
  </defs>

  <!-- Base + ambient + grid -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow-cyan)"/>
  <rect width="1200" height="630" fill="url(#glow-magenta)"/>

  <!--
    FR mark. Master glyph is on a 1024 viewBox; scale 0.30 yields a ~300 px
    tall mark, centred horizontally and sitting above the wordmark.
  -->
  <g transform="translate(446 30) scale(0.30)" filter="url(#bloom)">
    <use href="#fr-glyph" stroke="url(#neon)" stroke-width="62"/>
    <use href="#fr-glyph" stroke="#0a0c14"   stroke-width="24"/>
    <use href="#fr-glyph" stroke="#ffffff"   stroke-width="6" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="400" text-anchor="middle"
        font-family="Segoe UI Variable, system-ui, sans-serif"
        font-weight="800" font-size="84" letter-spacing="6">
    <tspan fill="#e6f1ff">FRESH</tspan><tspan fill="#ff2bd6">RIG</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="446" text-anchor="middle"
        font-family="Segoe UI Variable, system-ui, sans-serif"
        font-weight="400" font-size="22" letter-spacing="3" fill="#8a93a8">
    SETUP ANY PC. IN MINUTES.
  </text>

  <!-- Feature pills (cyan rim) -->
  <g font-family="Segoe UI Variable, system-ui, sans-serif" font-size="14" font-weight="500">
    <rect x="220" y="498" width="220" height="40" rx="20"
          fill="rgba(0,229,255,0.10)" stroke="#00e5ff" stroke-opacity="0.45" stroke-width="1"/>
    <text x="330" y="523" text-anchor="middle" fill="#00e5ff">Hardware Detection</text>

    <rect x="490" y="498" width="220" height="40" rx="20"
          fill="rgba(0,229,255,0.10)" stroke="#00e5ff" stroke-opacity="0.45" stroke-width="1"/>
    <text x="600" y="523" text-anchor="middle" fill="#00e5ff">Driver Finder</text>

    <rect x="760" y="498" width="220" height="40" rx="20"
          fill="rgba(255,43,214,0.10)" stroke="#ff2bd6" stroke-opacity="0.45" stroke-width="1"/>
    <text x="870" y="523" text-anchor="middle" fill="#ff2bd6">Batch App Install</text>
  </g>

  <!-- Footer -->
  <text x="600" y="582" text-anchor="middle"
        font-family="Segoe UI Variable, system-ui, sans-serif"
        font-size="14" letter-spacing="2" fill="#525a73">
    FREE &amp; OPEN SOURCE  ·  BUILT WITH RUST &amp; TAURI
  </text>
</svg>
